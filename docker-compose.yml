services:
  db:
    image: postgres:16-alpine
    container_name: loanpilot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-loanpilot}
      POSTGRES_USER: ${POSTGRES_USER:-loanpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loanpilot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loanpilot} -d ${POSTGRES_DB:-loanpilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: loanpilot-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://loanpilot:loanpilot@db:5432/loanpilot}
      ENVIRONMENT: production
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./front-end
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: loanpilot-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
