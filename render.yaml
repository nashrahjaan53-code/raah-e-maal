services:
  - type: web
    name: raah-e-maal-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./loanpilot.db
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: ADMIN_USERNAMES
        value: admin
      - key: RATE_LIMIT_REQUESTS
        value: 120
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
